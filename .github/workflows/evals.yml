name: evals

on:
  push:
    branches: [main]
  pull_request:

jobs:
  layer1:
    name: Layer 1 structural
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Layer 1
        run: python evals/run_evals.py
